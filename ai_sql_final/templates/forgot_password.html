<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — AI SQL Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    padding: 48px 40px; width: 100%; max-width: 440px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo svg { width: 52px; height: 52px; margin-bottom: 12px; }
  h1 { color: #fff; font-size: 1.5rem; text-align: center; margin-bottom: 6px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: #94a3b8; text-align: center; font-size: 0.88rem; margin-bottom: 28px; }
  .step { display: none; }
  .step.active { display: block; }
  label { display: block; color: #cbd5e1; font-size: 0.85rem; margin-bottom: 6px; }
  input[type="email"], input[type="text"], input[type="password"] {
    width: 100%; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
    padding: 12px 16px; color: #fff; font-size: 0.95rem; outline: none;
    transition: border-color 0.2s; margin-bottom: 18px;
  }
  input:focus { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.2); }
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff; border: none; border-radius: 10px;
    font-size: 0.97rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .msg { border-radius: 10px; padding: 11px 15px; font-size: 0.85rem; margin-bottom: 16px; }
  .msg.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
  .msg.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: #6ee7b7; }
  .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .otp-inputs input {
    width: 48px; height: 52px; text-align: center; font-size: 1.3rem;
    font-weight: 700; letter-spacing: 1px; margin-bottom: 0; padding: 0;
    border-radius: 10px;
  }
  .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: background 0.3s; }
  .dot.active { background: #a78bfa; }
  .dot.done { background: #34d399; }
  .back-link { text-align: center; margin-top: 20px; }
  .back-link a { color: #a78bfa; text-decoration: none; font-size: 0.87rem; }
  .dev-note { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
    color: #fbbf24; border-radius: 8px; padding: 10px 14px; font-size: 0.8rem;
    margin-bottom: 14px; display: none; }
  .resend-row { text-align: center; margin-top: 10px; margin-bottom: 14px; }
  .resend-row button { background: none; border: none; color: #818cf8; font-size: 0.83rem;
    cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="26" fill="url(#g1)"/>
      <path d="M14 20h24M14 26h24M14 32h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="34" cy="34" r="7" fill="#7c3aed" stroke="#fff" stroke-width="2"/>
      <path d="M31 34l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
          <stop stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
    <h1>Reset Password</h1>
    <p class="subtitle" id="stepSubtitle">Enter your email to receive a verification code</p>
  </div>

  <div class="step-indicator">
    <div class="dot active" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <div id="msgBox"></div>

  <!-- Step 1: Email -->
  <div class="step active" id="step1">
    <label for="emailInput">Email Address</label>
    <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    <button class="btn" id="sendOtpBtn" onclick="sendOtp()">Send Verification Code</button>
  </div>

  <!-- Step 2: OTP -->
  <div class="step" id="step2">
    <label style="text-align:center;display:block;margin-bottom:12px;">Enter the 6-digit code</label>
    <div class="otp-inputs">
      <input type="text" maxlength="1" class="otp-digit" id="otp0" oninput="otpNext(0)" onkeydown="otpBack(event,0)">
      <input type="text" maxlength="1" class="otp-digit" id="otp1" oninput="otpNext(1)" onkeydown="otpBack(event,1)">
      <input type="text" maxlength="1" class="otp-digit" id="otp2" oninput="otpNext(2)" onkeydown="otpBack(event,2)">
      <input type="text" maxlength="1" class="otp-digit" id="otp3" oninput="otpNext(3)" onkeydown="otpBack(event,3)">
      <input type="text" maxlength="1" class="otp-digit" id="otp4" oninput="otpNext(4)" onkeydown="otpBack(event,4)">
      <input type="text" maxlength="1" class="otp-digit" id="otp5" oninput="otpNext(5)" onkeydown="otpBack(event,5)">
    </div>
    <div id="devOtpNote" class="dev-note"></div>
    <button class="btn" id="verifyOtpBtn" onclick="verifyOtp()">Verify Code</button>
    <div class="resend-row">
      <button onclick="sendOtp(true)">Resend code</button>
    </div>
  </div>

  <!-- Step 3: New Password -->
  <div class="step" id="step3">
    <label for="newPass">New Password</label>
    <input type="password" id="newPass" placeholder="Min. 6 characters">
    <label for="confirmPass">Confirm Password</label>
    <input type="password" id="confirmPass" placeholder="Re-enter password">
    <button class="btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
  </div>

  <div class="back-link"><a href="/login">← Back to Sign In</a></div>
</div>

<script>
let currentEmail = '';
const subtitles = [
  'Enter your email to receive a verification code',
  'Check your email for the 6-digit OTP code',
  'Create your new password'
];

function showMsg(text, type='error') {
  const box = document.getElementById('msgBox');
  box.innerHTML = `<div class="msg ${type}">${text}</div>`;
}
function clearMsg() { document.getElementById('msgBox').innerHTML = ''; }

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    document.getElementById(`step${i}`).classList.toggle('active', i === n);
    const dot = document.getElementById(`dot${i}`);
    dot.className = 'dot' + (i < n ? ' done' : i === n ? ' active' : '');
  }
  document.getElementById('stepSubtitle').textContent = subtitles[n-1];
  clearMsg();
}

async function sendOtp(resend=false) {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) { showMsg('Please enter your email address.'); return; }
  currentEmail = email;
  const btn = document.getElementById('sendOtpBtn');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const r = await fetch('/api/send-otp', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})});
    const d = await r.json();
    if (d.ok) {
      setStep(2);
      if (d.dev_otp) {
        const note = document.getElementById('devOtpNote');
        note.style.display = 'block';
        note.innerHTML = `⚠️ <strong>Dev mode:</strong> Your OTP is <strong style="letter-spacing:3px">${d.dev_otp}</strong>`;
      }
      if (resend) showMsg('A new code has been sent.', 'success');
      document.getElementById('otp0').focus();
    } else {
      showMsg(d.message);
    }
  } catch(e) { showMsg('Network error. Please try again.'); }
  btn.disabled = false; btn.textContent = 'Send Verification Code';
}

function otpNext(i) {
  const val = document.getElementById(`otp${i}`).value;
  if (val && i < 5) document.getElementById(`otp${i+1}`).focus();
  // Auto-verify when all filled
  const allFilled = [...Array(6)].every((_,j) => document.getElementById(`otp${j}`).value);
  if (allFilled) verifyOtp();
}
function otpBack(e, i) {
  if (e.key === 'Backspace' && !document.getElementById(`otp${i}`).value && i > 0) {
    document.getElementById(`otp${i-1}`).focus();
  }
}

async function verifyOtp() {
  const otp = [...Array(6)].map((_,i) => document.getElementById(`otp${i}`).value).join('');
  if (otp.length < 6) { showMsg('Please enter the complete 6-digit code.'); return; }
  const btn = document.getElementById('verifyOtpBtn');
  btn.disabled = true; btn.textContent = 'Verifying...';
  try {
    const r = await fetch('/api/verify-otp', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: currentEmail, otp})});
    const d = await r.json();
    if (d.ok) { setStep(3); showMsg('✅ Identity verified! Set your new password.', 'success'); }
    else { showMsg(d.message); [...Array(6)].forEach((_,i) => { document.getElementById(`otp${i}`).value = ''; }); document.getElementById('otp0').focus(); }
  } catch(e) { showMsg('Network error.'); }
  btn.disabled = false; btn.textContent = 'Verify Code';
}

async function resetPassword() {
  const password = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  if (!password || password.length < 6) { showMsg('Password must be at least 6 characters.'); return; }
  if (password !== confirm) { showMsg('Passwords do not match.'); return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const r = await fetch('/api/reset-password', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: currentEmail, password})});
    const d = await r.json();
    if (d.ok) {
      showMsg('✅ Password reset successfully! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login', 2000);
    } else { showMsg(d.message); }
  } catch(e) { showMsg('Network error.'); }
  btn.disabled = false; btn.textContent = 'Reset Password';
}
</script>
</body>
</html>
