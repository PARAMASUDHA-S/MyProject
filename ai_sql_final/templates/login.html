<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — AI Based SQL Query Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%; max-width: 440px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .logo svg { width: 52px; height: 52px; margin-bottom: 12px; }
  h1 {
    color: #fff; font-size: 1.6rem; text-align: center; margin-bottom: 6px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { color: #94a3b8; text-align: center; font-size: 0.9rem; margin-bottom: 32px; }
  label { display: block; color: #cbd5e1; font-size: 0.85rem; margin-bottom: 6px; }
  input[type="email"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  input:focus {
    border-color: #a78bfa;
    box-shadow: 0 0 0 3px rgba(167,139,250,0.2);
  }
  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.88rem;
    margin-bottom: 20px;
  }
  .link-row { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.88rem; }
  .link-row a { color: #a78bfa; text-decoration: none; font-weight: 500; }
  .link-row a:hover { text-decoration: underline; }
  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 24px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="26" fill="url(#g1)"/>
      <path d="M14 20h24M14 26h24M14 32h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="34" cy="34" r="7" fill="#7c3aed" stroke="#fff" stroke-width="2"/>
      <path d="M31 34l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
          <stop stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
    </svg>
    <h1>SQL Query Assistant</h1>
    <p class="subtitle">Sign in to your account</p>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">

    <button type="submit" class="btn">Sign In</button>
  </form>

  <div style="text-align:right;margin-top:-8px;margin-bottom:16px;">
    <a href="/forgot-password" style="color:#a78bfa;font-size:0.83rem;text-decoration:none;">Forgot password?</a>
  </div>

  <hr class="divider">
  <div class="link-row">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>
</body>
</html>
